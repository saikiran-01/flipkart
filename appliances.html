<!DOCTYPE html>
<html>
<head>
    <title>Appliances</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f3f6;
        }

        /* HEADER */
        header {
            background: #2874f0;
            color: white;
            display: flex;
            align-items: center;
            padding: 10px 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            margin-right: 30px;
        }

        .search-box {
            flex: 1;
        }

        .search-box input {
            width: 60%;
            padding: 8px;
            border: none;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        /* PAGE TITLE */
        .title {
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        /* PRODUCTS */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product {
            background: white;
            margin: 10px;
            padding: 15px;
            width: 220px;
            border-radius: 5px;
            text-align: center;
            transition: 0.3s;
        }

        .product:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: contain;
        }

        .price {
            color: green;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            background: #ff9f00;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #fb641b;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">Flipkart</div>

    <h1>Appliances</h1>
    <div class="search-box">
        <input type="text" placeholder="Search appliances...">
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="electronics.html">Electronics</a>
        <a href="clothes.html">Clothes</a>
        <a href="appliances.html">Appliances</a>
    </div>
</header>

<div class="title">Home Appliances</div>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Refrigerator</h3>
        <div class="price">₹18,999</div>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Washing Machine</h3>
        <div class="price">₹14,500</div>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Air Conditioner</h3>
        <div class="price">₹32,000</div>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Microwave Oven</h3>
        <div class="price">₹6,999</div>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
