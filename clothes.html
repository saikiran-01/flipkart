<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clothing Brands</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #2874f0; color: white; padding: 20px; text-align: center; }
        nav { margin: 15px 0; }
        nav a { margin: 0 15px; color: white; text-decoration: none; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
        .card { border: 1px solid #ccc; border-radius: 8px; overflow: hidden; }
        .card img { width: 100%; height: auto; }
        .card h3 { margin: 10px; }
        footer { background-color: #2874f0; color: white; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Flipkart Clothing Brands</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Kids</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <main class="container">
        <div class="card">
            <img src="https://example.com/brand1.jpg" alt="Brand 1">
            <h3>Brand 1</h3>
        </div>
        <div class="card">
            <img src="https://example.com/brand2.jpg" alt="Brand 2">
            <h3>Brand 2</h3>
        </div>
        <div class="card">
            <img src="https://example.com/brand3.jpg" alt="Brand 3">
            <h3>Brand 3</h3>
        </div>
        <div class="card">
            <img src="https://example.com/brand4.jpg" alt="Brand 4">
            <h3>Brand 4</h3>
        </div>
        <!-- Add more brands as necessary -->
    </main>
    <footer>
        <p>&copy; 2026 Flipkart. All rights reserved.</p>
    </footer>
</body>
</html>
